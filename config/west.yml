      path: modules/zmk-module-runtime-input-processor
    - name: zmk-module-ble-management
      revision: main
      url: https://github.com/cormoran/zmk-module-ble-management
      path: modules/zmk-module-ble-management
    - name: zmk-module-settings-rpc
      revision: main
      url: https://github.com/cormoran/zmk-module-settings-rpc
      path: modules/zmk-module-settings-rpc
  self:
    path: config
    
